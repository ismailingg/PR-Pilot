extraction_task:
  description: >
    Analyze the following GitHub issue and PR description for {repo_name}:
    PR Body: {pr_body}
    Issue Context: {issue_description}
    
    Identify the primary goal and list specific acceptance criteria or risks.
  expected_output: >
    A structured IntentSummary object containing the goal,
    acceptance_criteria, and risks_mentioned.
    acceptance_criteria must be a JSON array of plain strings
    (e.g. ["criterion 1", "criterion 2"]), not objects.
  agent: intent_extractor

review_task:
  description: >
    As a Senior {tech_stack} Engineer, perform a surgical review of the 
    following code diff:
    {diff}

    HOW TO COUNT LINE NUMBERS IN THIS DIFF:
    - The "@@ -0,0 +1,N @@" header means the new file starts at line 1.
    - Count ONLY lines beginning with '+' (new code) or ' ' (unchanged context).
    - Each such line increments the counter by 1, including blank '+' lines.
    - Lines beginning with '-', 'diff', 'index', '---', '+++', or '@@' are NOT real lines — skip them.
    - Example: if line 1 is blank (+), line 2 is 'import requests', line 3 is blank,
      line 4 is 'def fetch_data():', line 5 is blank, line 6 is '    api_key = "..."'
      then the hardcoded key is at line 6, NOT line 5.

    Find bugs, unoptimized logic, and framework-specific violations.
    When the diff removes bad behavior (e.g. hardcoded password) and adds validation,
    do not report the new validation logic as 'hardcoded' or 'weak' if it is implementing the stated requirements.
    You MUST cite the filename and line numbers for every finding.
    If you are not confident about a line number, cite the function name instead.
  expected_output: >
    A detailed list of code findings including filename, line numbers,
    severity, and suggestions.
  agent: diff_reviewer

security_scan_task:
  description: >
    Run a Semgrep static analysis scan on the following PR diff and interpret the results.
    
    Diff to scan:
    {diff}
    
    Steps:
    1. Use the Semgrep Security Scanner tool with the diff above as input.
    2. Read the JSON output carefully.
    3. For each finding, decide if it is a true positive or false positive.
    4. Map true positives to OWASP categories where applicable.
    5. Override severity if Semgrep's rating is wrong (e.g. hardcoded secret = CRITICAL always).
    6. Provide a concrete fix suggestion for each true positive.
    7. If the tool returns zero findings, report that explicitly — do NOT invent issues.
    8. If the scan errored or was skipped, report the reason honestly.

    IMPORTANT: Do not fabricate findings. Only report what the tool actually returned.
  expected_output: >
    A structured security scan report containing:
    - scan_status: "completed", "skipped", or "error"
    - files_scanned: number of files analyzed
    - true_positives: list of real findings, each with filename, line, severity, 
      owasp_category, description, and suggested_fix
    - false_positives: list of dismissed findings with reasoning
    - critical_count: number of CRITICAL severity true positives
    - summary: one paragraph describing the overall security posture of the diff
  agent: security_scanner


test_execution_task:
  description: >
    Run the test suite for the PR branch in an isolated Docker sandbox.
    Run the full test suite regardless of whether the PR modifies test files.
    A PR that doesn't touch tests can still break them — that's exactly what
    we need to catch.

    You have the following inputs:
    - repo_url: https://github.com/{repo_name}
    - branch: {pr_branch}
    - github_token: {github_token}

    Steps:
    1. Call the Sandbox Test Runner tool with these exact arguments:
       repo_url: "https://github.com/{repo_name}"
       branch: "{pr_branch}"
       github_token: "{github_token}"
    2. Read the returned JSON carefully.
    3. Report the status (completed/skipped/error/timeout) honestly.
    4. If completed: report passed/failed counts and quote any failing test names from logs.
    5. If skipped: state the reason — do NOT treat this as a test failure.
    6. If timeout or error: flag it with the details.
    7. Never invent test results. Only report what the tool returned.
  expected_output: >
    A TestExecutionResult object containing:
    - status: completed, skipped, error, or timeout
    - language: detected runtime (python, nodejs, go, etc.)
    - passed: true/false
    - test_counts: total, passed, failed
    - duration_seconds: how long it took
    - logs_summary: key lines from the output, especially failures
    - skip_reason: if skipped, why
  agent: test_executor

simulation_task:
  description: >
    You are the Reliability & Impact Engineer.
    Analyze the potential broader impact of merging this PR.
    
    Inputs you have:
    - Intent Summary (from Intent Extractor)
    - Code diff and findings (from Diff Reviewer)
    - Security scan results (from Security Scanner)
    - Technology stack and scope (from Scout)
    
    Think step-by-step:
    1. What modules, APIs, shared logic, or data flows might this PR affect?
    2. Could this introduce regressions in performance, stability, or error handling?
    3. Are there any obvious breaking changes for other parts of the system?
    4. What happens under edge cases or high load?
    5. Do the security scan findings introduce any stability risks beyond security?
    
    Be precise and evidence-based. Do not exaggerate small issues.
    Focus on real production risks.
  expected_output: >
    A structured assessment containing:
    - stability_verdict: one of "safe", "low_risk", "medium_risk", "high_risk", "critical"
    - confidence: float between 0.0 and 1.0
    - potential_side_effects: list of strings (clear, actionable)
    - regression_risks: list of strings (if any)
    - recommendation_note: a short, professional note for the human reviewer
  agent: simulation_engineer
  context:
    - extraction_task
    - review_task
    - security_scan_task
    - test_execution_task
    - scouting_task

verification_task:
  description: >
    Compare the IntentSummary with the findings from the diff_reviewer and the
    security_scanner. Your job is to decide whether the current diff implements 
    the goal and acceptance criteria. 
    
    Distinguish between: 
    (a) code that enforces a rule (e.g. rejecting weak passwords) vs 
    (b) code that is a vulnerability. Only treat (b) as blocking.
    
    For security scan findings: only treat CRITICAL and HIGH true positives 
    as blocking. LOW and MEDIUM findings are advisory.
    
    Fill out the CodeReviewReport. You must decide if the implementation 
    actually matches the goal and assign quality and security scores.
    Let the security scan results influence the security_score directly:
    - Any CRITICAL true positive: security_score ≤ 4.0
    - Any HIGH true positive: security_score ≤ 6.5
    - Only LOW/MEDIUM or no findings: security_score can be 7.0+
  expected_output: >
    A complete CodeReviewReport object including the nested IntentSummary, 
    a list of CodeFindings, and numerical scores.
  agent: verifier

decision_task:
  description: >
    Review the CodeReviewReport and apply a Safety first, but merge when the 
    acceptance criteria are clearly met and there are no critical security defects policy. 
    
    Decide if this PR is ready to merge. 
    solves_issue: yes should be used when the diff implements the required behavior, 
    even if the review found style/maintainability suggestions.
    
    When writing the comment_draft, include a dedicated Security Scan Results section
    that lists every Semgrep finding (or confirms none were found), and a Test Results
    section that reports pass/fail counts or explains why tests were skipped.
    
    Draft a professional, encouraging, yet firm GitHub comment that summarizes all findings.
    Output valid JSON only: in comment_draft use \n for line breaks, not actual newlines.
  expected_output: >
    A ReviewVerdict object with solves_issue (yes/no/partial), 
    confidence (0.0-1.0), and the full comment_draft in Markdown.
    comment_draft must be one JSON string with \n for newlines so the output stays valid JSON.
    comment_draft must include these sections in order:
    ## Summary | ## What Changed | ## Security Scan Results | ## Test Results | ## Code Review Findings | ## Recommendation
  agent: decider

scouting_task:
  description: >
    Scan the file paths and imports in the following diff:
    {diff}
    
    Identify the programming languages, frameworks, and build tools used for the project {repo_name}. 
    Estimate how complex this review will be based on the number of files touched.
  expected_output: >
    A ProjectContext object containing the detected tech_stack, 
    complexity_level, and file count.
  agent: scout