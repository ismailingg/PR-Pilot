extraction_task:
  description: >
    Analyze the following GitHub issue and PR description for {repo_name}:
    PR Body: {pr_body}
    Issue Context: {issue_description}
    
    Identify the primary goal and list specific acceptance criteria or risks.
  expected_output: >
    A structured IntentSummary object containing the goal,
    acceptance_criteria, and risks_mentioned.
    acceptance_criteria must be a JSON array of plain strings
    (e.g. ["criterion 1", "criterion 2"]), not objects.
  agent: intent_extractor

review_task:
  description: >
    As a Senior {tech_stack} Engineer, perform a surgical review of the 
    following code diff:
    {diff}

    HOW TO COUNT LINE NUMBERS IN THIS DIFF:
    - The "@@ -0,0 +1,N @@" header means the new file starts at line 1.
    - Count ONLY lines beginning with '+' (new code) or ' ' (unchanged context).
    - Each such line increments the counter by 1, including blank '+' lines.
    - Lines beginning with '-', 'diff', 'index', '---', '+++', or '@@' are NOT real lines — skip them.
    - Example: if line 1 is blank (+), line 2 is 'import requests', line 3 is blank,
      line 4 is 'def fetch_data():', line 5 is blank, line 6 is '    api_key = "..."'
      then the hardcoded key is at line 6, NOT line 5.

    Find bugs, unoptimized logic, and framework-specific violations.
    When the diff removes bad behavior (e.g. hardcoded password) and adds validation,
    do not report the new validation logic as 'hardcoded' or 'weak' if it is implementing the stated requirements.
    You MUST cite the filename and line numbers for every finding.
    If you are not confident about a line number, cite the function name instead.
  expected_output: >
    A detailed list of code findings including filename, line numbers,
    severity, and suggestions.
  agent: diff_reviewer

security_scan_task:
  description: >
    Run a Semgrep static analysis scan on the following PR diff and interpret the results.
    
    Diff to scan:
    {diff}
    
    Steps:
    1. Use the Semgrep Security Scanner tool with the diff above as input.
    2. Read the JSON output carefully.
    3. For each finding, decide if it is a true positive or false positive.
    4. Map true positives to OWASP categories where applicable.
    5. Override severity if Semgrep's rating is wrong (e.g. hardcoded secret = CRITICAL always).
    6. Provide a concrete fix suggestion for each true positive.
    7. If the tool returns zero findings, report that explicitly — do NOT invent issues.
    8. If the scan errored or was skipped, report the reason honestly.

    IMPORTANT: Do not fabricate findings. Only report what the tool actually returned.
  expected_output: >
    A structured security scan report containing:
    - scan_status: "completed", "skipped", or "error"
    - files_scanned: number of files analyzed
    - true_positives: list of real findings, each with filename, line, severity, 
      owasp_category, description, and suggested_fix
    - false_positives: list of dismissed findings with reasoning
    - critical_count: number of CRITICAL severity true positives
    - summary: one paragraph describing the overall security posture of the diff
  agent: security_scanner



simulation_task:
  description: >
    You are the Reliability & Impact Engineer.
    Analyze the potential broader impact of merging this PR.
    
    Inputs you have:
    - Intent Summary (from Intent Extractor)
    - Code diff and findings (from Diff Reviewer)
    - Security scan results (from Security Scanner)
    - Technology stack and scope (from Scout)
    
    Think step-by-step:
    1. What modules, APIs, shared logic, or data flows might this PR affect?
    2. Could this introduce regressions in performance, stability, or error handling?
    3. Are there any obvious breaking changes for other parts of the system?
    4. What happens under edge cases or high load?
    5. Do the security scan findings introduce any stability risks beyond security?
    
    Be precise and evidence-based. Do not exaggerate small issues.
    Focus on real production risks.
  expected_output: >
    A structured assessment containing:
    - stability_verdict: one of "safe", "low_risk", "medium_risk", "high_risk", "critical"
    - confidence: float between 0.0 and 1.0
    - potential_side_effects: list of strings (clear, actionable)
    - regression_risks: list of strings (if any)
    - recommendation_note: a short, professional note for the human reviewer
  agent: simulation_engineer
  context:
    - extraction_task
    - review_task
    - security_scan_task
    - scouting_task

verification_task:
  description: >
    Compare the IntentSummary with the findings from the diff_reviewer and the
    security_scanner. Your job is to verify the implementation, not to find
    more things to complain about.

    YOUR ONLY JOB:
    1. Did the diff implement each acceptance criterion? Mark each one fulfilled or not.
    2. Are the diff_reviewer's findings real bugs with line citations, or style opinions?
       - Real bug with line citation → include in code_findings
       - Style opinion / "consider doing X" / missing docstring → DISCARD, do not include
    3. CRITICAL — DISCARD any finding that claims a variable or import is "undefined"
       or "not imported" unless the diff shows a '-' line explicitly removing that
       variable or import. A diff is a PARTIAL VIEW of the file. Variables like
       `users`, `time`, `account_lock_time` defined elsewhere in the file will not
       appear in the diff but they exist. Flagging them as undefined is always
       a false positive — discard it immediately.
    4. Does the security scan result match the code review? If the scan is clean,
       do not add security concerns from your own reasoning unless you can cite
       a specific line with a specific exploit.
    5. Assign scores based on evidence only:
       - quality_score: based on whether requirements are met and real bugs found
       - security_score: driven by Semgrep results, not LLM speculation
         * CRITICAL true positive: security_score ≤ 4.0
         * HIGH true positive: security_score ≤ 6.5
         * Clean scan: security_score 8.0+

    REMEMBER: A function that works correctly and meets the requirement
    is a PASS even if it could theoretically be refactored.
  expected_output: >
    A complete CodeReviewReport with:
    - intent_summary: the goal and criteria
    - code_findings: ONLY real bugs with line citations.
      If there are no real bugs → output an EMPTY LIST [].
      Do NOT populate code_findings with style suggestions, "consider adding X",
      missing docstrings, or theoretical improvements. Empty list means clean code.
    - overall_assessment: one sentence — "X function correctly implements Y requirement."
      Do not add caveats, suggestions, or hedging to overall_assessment.
    - specific_suggestions: EMPTY LIST [] unless there is a real bug that needs fixing.
      "Consider adding validation" is NOT a specific suggestion — it is noise. Leave it out.
    - quality_score: 9.0 if requirements met and no real bugs. Do not penalise clean code.
    - security_score: driven by Semgrep only. 9.0 if scan is clean.
  agent: verifier

decision_task:
  description: >
    Review the CodeReviewReport and write a GitHub comment that a developer
    would actually find useful — specific, honest, and calibrated to the real
    quality of the code.

    BEFORE WRITING THE COMMENT, apply this checklist:
    1. Did the diff implement what the issue asked for? If yes → solves_issue: yes
    2. Are there any REAL bugs (logic errors, exceptions, security issues with line citations)?
       If no → verdict is strongly_recommend_merge unless security scan found something.
    3. Are the only "findings" style suggestions or elegance improvements?
       If yes → these are NOT findings. Mention them briefly in Recommendation only.
    4. Does the security scan contradict the code review or vice versa?
       If yes → reconcile them. Do not say "scan is clean" and then
       "ensure function X is secure" in the same comment.

    THE COMMENT MUST FEEL LIKE IT CAME FROM A SENIOR ENGINEER WHO READ THE CODE,
    not a checklist bot. The developer should be able to see exactly what was
    verified and trust the verdict.

    Output valid JSON only. Use \n for line breaks in comment_draft.
  expected_output: >
    A ReviewVerdict object with verdict, confidence (0.0-1.0), summary, and comment_draft.
    comment_draft must be valid JSON string with \n for newlines.
    comment_draft sections in order:
    ## Summary | ## What Was Verified | ## Security Scan Results | ## Findings | ## Recommendation
    
    In "What Was Verified": name each function/feature reviewed with one line saying what it does
    and whether it works correctly. E.g. "✅ get_rate_limit_stats() — cleans stale timestamps,
    returns per-client request count and rate limit status. Logic is correct."
    
    In "Findings": only real bugs with line citations. If none: "✅ No blocking issues found."
    Style suggestions belong in Recommendation only, as a brief optional note.
  agent: decider

scouting_task:
  description: >
    Scan the file paths and imports in the following diff:
    {diff}
    
    Identify the programming languages, frameworks, and build tools used for the project {repo_name}. 
    Estimate how complex this review will be based on the number of files touched.
  expected_output: >
    A ProjectContext object containing the detected tech_stack, 
    complexity_level, and file count.
  agent: scout