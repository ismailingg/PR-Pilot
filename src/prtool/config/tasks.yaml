extraction_task:
  description: >
    Analyze the following GitHub issue and PR description for {repo_name}:
    PR Body: {pr_body}
    Issue Context: {issue_description}
    
    Identify the primary goal and list specific acceptance criteria or risks.
  expected_output: >
    A structured IntentSummary object containing the goal,
    acceptance_criteria, and risks_mentioned.
    acceptance_criteria must be a JSON array of plain strings
    (e.g. ["criterion 1", "criterion 2"]), not objects.
  agent: intent_extractor

review_task:
  description: >
    You are a Senior {tech_stack} Engineer. Review the following code diff:
    {diff}

    The diff has approximately {diff_line_count} added lines (scope: {pr_scope}).

    If scope is "large" (200+ lines):
    - You MUST enumerate every new function found on a '+def ' line
    - Group findings by file
    - Do not summarize — list each function with its mechanical description
    - Flag if the PR is too large to review thoroughly in one pass

    If scope is "small" (<50 lines):
    - Standard review depth is sufficient

    HOW TO COUNT LINE NUMBERS IN THIS DIFF:
    - The "@@ -0,0 +1,N @@" header means the new file starts at line 1.
    - Count ONLY lines beginning with '+' (new code) or ' ' (unchanged context).
    - Each such line increments the counter by 1, including blank '+' lines.
    - Lines beginning with '-', 'diff', 'index', '---', '+++', or '@@' are NOT real lines — skip them.
    - Example: if line 1 is blank (+), line 2 is 'import requests', line 3 is blank,
      line 4 is 'def fetch_data():', line 5 is blank, line 6 is '    api_key = "..."'
      then the hardcoded key is at line 6, NOT line 5.

    Find bugs, unoptimized logic, and framework-specific violations.
    When the diff removes bad behavior (e.g. hardcoded password) and adds validation,
    do not report the new validation logic as 'hardcoded' or 'weak' if it is implementing the stated requirements.
    You MUST cite the filename and line numbers for every finding.
    If you are not confident about a line number, cite the function name instead.
  expected_output: >
    For each function/feature in the diff:
    1. A mechanical description of what the code does — which variables it reads,
       what conditions it checks, what it returns. Never copy the docstring.
    2. If a real bug exists: filename, line number, severity, exact consequence.
    3. If no bug: explicitly state the function passes review and why.
    The decider reads your output to write the final comment — give it
    specific mechanical detail, not paraphrased PR descriptions.
  agent: diff_reviewer

security_scan_task:
  description: >
    Run a Semgrep static analysis scan on the following PR diff and interpret the results.
    
    Diff to scan:
    {diff}
    
    Steps:
    1. Use the Semgrep Security Scanner tool with the diff above as input.
    2. Read the JSON output. It contains a "findings" array and a "finding_count" integer.
    3. YOUR true_positives LIST MUST ONLY CONTAIN FINDINGS THAT APPEAR IN THE TOOL OUTPUT.
       If finding_count is 1, you report exactly 1 finding maximum.
       If finding_count is 0, true_positives must be an empty list [].
    4. DO NOT add findings from your own knowledge or reasoning.
    5. For each real finding: map it to an OWASP category, override severity only when clearly
       wrong (e.g. a live hardcoded secret that Semgrep rated INFO should be CRITICAL),
       and provide a concrete fix suggestion.
    6. Line numbers MUST come from the tool's "line_start" field. Never guess.
    7. If the tool returns finding_count of 0, set true_positives to [] and say so clearly.
    8. If the scan errored or was skipped, report the reason honestly.

    ABSOLUTE RULE: true_positives.length must equal finding_count from the tool output.
    Any finding not in the tool JSON is fabricated and must NOT appear in your report.
  expected_output: >
    A structured security scan report containing:
    - scan_status: "completed", "skipped", or "error"
    - files_scanned: number of files analyzed
    - true_positives: list of findings FROM THE TOOL ONLY
    - false_positives: list of dismissed findings with reasoning
    - critical_count: number of CRITICAL severity true positives
    - summary: one clear sentence — if Semgrep found nothing, say so explicitly
  agent: security_scanner

merge_sim_task:
  description: >
    Simulate merging the PR branch into the base branch.

    You have these inputs:
    - repo_url: https://github.com/{repo_name}
    - pr_branch: {pr_branch}
    - github_token: {github_token}
    - base_branch: main

    Steps:
    1. Call the Merge Simulation Tool with these exact arguments:
       repo_url: "https://github.com/{repo_name}"
       pr_branch: "{pr_branch}"
       github_token: "{github_token}"
       base_branch: "main"
    2. Read the result carefully.
    3. If mergeable is true: report clean merge in one sentence.
    4. If mergeable is false: list every file in conflicting_files explicitly.
    5. If status is "error": report the reason — do not assume clean.
    6. Never invent or dismiss conflicts. Report exactly what the tool returned.
  expected_output: >
    A structured merge simulation report containing:
    - status: "completed" or "error"
    - mergeable: true or false
    - conflicts: number of conflicting files (0 if clean)
    - conflicting_files: list of filenames with conflicts (empty list if clean)
    - summary: one sentence describing the result
  agent: merge_sim_engineer

verification_task:
  description: >
    Compare the IntentSummary with the findings from the diff_reviewer and the
    security_scanner. Your job is to verify the implementation, not to find
    more things to complain about.

    You also have merge simulation results in your context.
    If merge conflicts were found, note them in overall_assessment.

    YOUR ONLY JOB:
    1. Did the diff implement each acceptance criterion? Mark each one fulfilled or not.
    2. Are the diff_reviewer's findings real bugs with line citations, or style opinions?
       - Real bug with line citation → include in code_findings
       - Style opinion / "consider doing X" / missing docstring → DISCARD, do not include
    3. CRITICAL — DISCARD any finding that claims a variable or import is "undefined"
       or "not imported" unless the diff shows a '-' line explicitly removing that
       variable or import. A diff is a PARTIAL VIEW of the file. Variables like
       `users`, `time`, `account_lock_time` defined elsewhere in the file will not
       appear in the diff but they exist. Flagging them as undefined is always
       a false positive — discard it immediately.
    4. Does the security scan result match the code review? If the scan is clean,
       do not add security concerns from your own reasoning unless you can cite
       a specific line with a specific exploit.
    5. Assign scores based on evidence only:
       - quality_score: based on whether requirements are met and real bugs found
       - security_score: driven by Semgrep results, not LLM speculation
         * CRITICAL true positive: security_score ≤ 4.0
         * HIGH true positive: security_score ≤ 6.5
         * Clean scan: security_score 8.0+

    REMEMBER: A function that works correctly and meets the requirement
    is a PASS even if it could theoretically be refactored.
  expected_output: >
    A complete CodeReviewReport with:
    - intent_summary: the goal and criteria
    - code_findings: ONLY real bugs with line citations.
      If there are no real bugs → output an EMPTY LIST [].
      Do NOT populate code_findings with style suggestions, "consider adding X",
      missing docstrings, or theoretical improvements. Empty list means clean code.
    - overall_assessment: one sentence — "X function correctly implements Y requirement."
      Do not add caveats, suggestions, or hedging to overall_assessment.
    - specific_suggestions: EMPTY LIST [] unless there is a real bug that needs fixing.
    - quality_score: 9.0 if requirements met and no real bugs.
    - security_score: 9.0 if Semgrep scan is clean.
  agent: verifier

decision_task:
  description: >
    Review the CodeReviewReport and write a GitHub PR review comment.

    Use the EXACT format defined in the decider agent's backstory.
    The comment must use proper markdown with ### headers, **bold**, and bullet points.

    BEFORE WRITING:
    1. Check code_findings — if empty AND merge clean, verdict is "Strongly Recommended to Merge"
    2. Check security scan — if clean, say so in one line
    3. Check merge simulation — if conflicts exist, list them under Security & Risk Assessment
       and set verdict to "Merge with Suggestions" minimum
    4. Pull mechanical descriptions from the diff_reviewer output for Positive Points.
       Do NOT use the PR description or docstring — use what the reviewer observed.
    5. For the timestamp, use: {current_datetime}
    6. If pr_scope is "large" and you have not enumerated every function in the diff,
       cap confidence at 0.75 and note "Large PR — partial review" in the summary.
       Never give 90%+ confidence on a PR with 200+ changed lines.
    7. If diff_truncated is true, add this note to the Summary section:
       "Note: diff was truncated for free tier — only the first ~300 lines were reviewed.
       Upgrade to paid or local tier for full diff analysis." 

    CONTENT RULES:
    - Summary must reference actual function names and say whether the goal was achieved
    - Positive Points must describe specific logic observed, not generic praise
    - Suggestions only if genuinely useful — label Minor or Nit
    - Recommendation ends with a single bold sentence verdict
    - Analysis Details section always included at the bottom

    Output valid JSON only. Use \n for line breaks in comment_draft.
  expected_output: >
    A ReviewVerdict object with:
    - verdict: MUST be exactly one of these strings:
        "strongly_recommend_merge"
        "merge_with_suggestions"
        "needs_work"
        "do_not_merge"
    - confidence: float 0.0 to 1.0
    - summary: 1-2 sentences
    - comment_draft: full GitHub comment as a JSON string with \n for line breaks,
      following the ### PR-Pilot AI Review format from the agent backstory
  agent: decider