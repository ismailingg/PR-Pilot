# =============================================================================
# PR-Pilot — Docker Compose
#
# Usage:
#   Free tier (Groq + OpenRouter):  docker compose up
#   Local tier (Ollama):            docker compose --profile local up
#   Dev mode (with ngrok tunnel):   docker compose --profile dev up
#   All together:                   docker compose --profile local --profile dev up
#
# First time setup:
#   1. cp .env.example .env  and fill in your values
#   2. Place your GitHub App private key at secrets/github.pem
#   3. docker compose up --build
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PR-Pilot FastAPI bot
  # ---------------------------------------------------------------------------
  prpilot:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: prpilot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PRPILOT_DB_PATH: /app/data/prpilot_audit.db
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - prpilot_data:/app/data
      - ./secrets:/app/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # ngrok — public HTTPS tunnel for local development
  # Profile: dev (only starts with --profile dev)
  #
  # Requires NGROK_AUTHTOKEN in your .env
  # Get a free token at: https://dashboard.ngrok.com/get-started/your-authtoken
  #
  # After starting, check the tunnel URL:
  #   docker logs prpilot-ngrok
  # Then set your GitHub App webhook URL to:
  #   https://<your-ngrok-url>/webhook
  # ---------------------------------------------------------------------------
  ngrok:
    image: ngrok/ngrok:latest
    container_name: prpilot-ngrok
    profiles:
      - dev
    restart: unless-stopped
    command: http prpilot:8000 --log stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - prpilot
    ports:
      - "4040:4040"   # ngrok web inspector at http://localhost:4040

  # ---------------------------------------------------------------------------
  # Ollama — local LLM server (used when LLM_TIER=local)
  # Profile: local (only starts with --profile local)
  # Pull your model after first start:
  #   docker exec prpilot-ollama ollama pull llama3.1
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: prpilot-ollama
    profiles:
      - local
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GPU support — uncomment if you have an NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  prpilot_data:
    driver: local
  ollama_models:
    driver: local